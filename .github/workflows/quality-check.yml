name: Quality Check

on:
  schedule:
    - cron: '0 23 * * *'  # 每天北京时间早7点 = UTC 23:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Run quality check
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        run: python .github/scripts/quality_check.py
      
      - name: Commit and push changes
        run: |
          git config user.name "AI Quality Bot"
          git config user.email "bot@gudaoqihuo.com"
          git add -A
          git diff --cached --quiet || git commit -m "Quality check: auto-optimize articles @ $(date -u +%Y-%m-%d)"
          git push
