name: Auto Content Deploy (Bilingual)

on:
  schedule:
    # 北京时间 06:00/09:00/12:00/15:00/19:00/22:00 (UTC 22/1/4/7/11/14)
    - cron: '0 22 * * *'  # 北京 06:00（主）
    - cron: '0 1  * * *'  # 北京 09:00（补06漏跑）
    - cron: '0 4  * * *'  # 北京 12:00（主）
    - cron: '0 7  * * *'  # 北京 15:00（补12漏跑）
    - cron: '0 11 * * *'  # 北京 19:00（主）
    - cron: '0 14 * * *'  # 北京 22:00（当日收尾）
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode: generate (default) or polish (rewrite 16 articles)'
        required: false
        default: 'generate'
        type: choice
        options:
          - generate
          - polish

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pyjwt

      - name: Generate bilingual content
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}

        run: |
          if [ "${{ github.event.inputs.mode || 'generate' }}" = 'polish' ]; then
            python scripts/polish_articles.py
          else
            python scripts/generate_content.py
          fi

      - name: Configure Git
        run: |
          git config --global user.name "Auto Content Bot"
          git config --global user.email "bot@gudaoqihuo.com"

      - name: Commit and push
        run: |
          git add -A
          git diff --staged --quiet && {
            echo "无新内容提交"
          } || {
            git commit -m "auto: 双语内容更新 $(date +%Y-%m-%d-%H%M)"
            # 先 fetch 远程最新
            git fetch origin main
            # 尝试 rebase，如果失败则强制使用本地版本
            git rebase origin/main || {
              echo "Rebase 冲突，使用本地版本覆盖"
              git rebase --abort
              git reset --hard origin/main
              git cherry-pick HEAD@{1} || true
            }
            # 强制推送（确保成功）
            git push origin main --force-with-lease || git push origin main --force
            echo "已推送 $(git log -1 --format='%s')"
          }
