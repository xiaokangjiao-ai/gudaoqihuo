name: Auto Content Deploy (Bilingual)

on:
  schedule:
    # 北京时间 6:00, 12:00, 19:00 (UTC 22:00前天, 4:00, 11:00)
    - cron: '0 22 * * *'    # 北京 6:00
    - cron: '0 4 * * *'     # 北京 12:00
    - cron: '0 11 * * *'    # 北京 19:00
  workflow_dispatch:

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pyjwt

      - name: Generate bilingual content
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        run: python scripts/generate_content.py

      - name: Configure Git
        run: |
          git config --global user.name "Auto Content Bot"
          git config --global user.email "bot@gudaoqihuo.com"

      - name: Commit and push
        run: |
          git add -A
          git diff --staged --quiet && {
            echo "无新内容提交"
          } || {
            git commit -m "auto: 双语内容更新 $(date +%Y-%m-%d-%H%M)"
            git pull origin main --rebase --strategy-option=theirs 2>/dev/null || true
            git push origin main || git push origin main --force-with-lease
            echo "已推送 $(git log -1 --format='%s')"
          }
