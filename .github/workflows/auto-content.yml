name: Auto Content Deploy (Bilingual)

on:
  schedule:
    # 北京时间 5:00, 12:00, 19:00, 22:00 (UTC 21:00, 4:00, 11:00, 14:00)
    - cron: '0 21 * * *'    # 北京 5:00 — 中国早晨(7点前2h缓冲)
    - cron: '0 4 * * *'     # 北京 12:00 — 中国中午(不变)
    - cron: '0 11 * * *'    # 北京 19:00 — 中国晚上(不变) / 美东早晨
    - cron: '0 14 * * *'    # 北京 22:00 — 美西早晨(PT 6:00)
  workflow_dispatch:

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pyjwt

      - name: Generate bilingual content
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
        run: python scripts/generate_content.py

      - name: Configure Git
        run: |
          git config --global user.name "Auto Content Bot"
          git config --global user.email "bot@gudaoqihuo.com"

      - name: Commit and push
        run: |
          git add -A
          git diff --staged --quiet && {
            echo "无新内容提交"
          } || {
            git commit -m "auto: 双语内容更新 $(date +%Y-%m-%d-%H%M)"
            # 先 fetch 远程最新
            git fetch origin main
            # 尝试 rebase，如果失败则强制使用本地版本
            git rebase origin/main || {
              echo "Rebase 冲突，使用本地版本覆盖"
              git rebase --abort
              git reset --hard origin/main
              git cherry-pick HEAD@{1} || true
            }
            # 强制推送（确保成功）
            git push origin main --force-with-lease || git push origin main --force
            echo "已推送 $(git log -1 --format='%s')"
          }
