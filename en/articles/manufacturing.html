<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manufacturing AI — AI Verticals</title>
<meta name="description" content="AI in Manufacturing. Real applications, actual companies, measurable impact on AI Verticals.">
<link rel="canonical" href="https://gudaoqihuo.com/en/articles/manufacturing.html">
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0a0a0f;color:#e8e8f0;margin:0;padding:0;min-height:100vh}
header{background:linear-gradient(135deg,#0a0a1a,#13132a);padding:40px 24px 30px;border-bottom:3px solid #ffb74d}
.breadcrumb{color:#8888a0;font-size:.8em;margin-bottom:12px}
.breadcrumb a{color:#8888a0;text-decoration:none}
.breadcrumb a:hover{color:#ffb74d}
h1{font-size:clamp(1.8em,4vw,2.6em);font-weight:800;margin-bottom:6px;color:#fff}
h1 span{margin-right:10px}
.subtitle{color:#8888a0;font-size:.95em;margin-bottom:0}
.back-link{display:inline-block;margin-top:16px;font-size:.82em;color:#ffb74d;text-decoration:none;font-weight:600}
.back-link:hover{text-decoration:underline}
.container{max-width:1100px;margin:0 auto;padding:40px 24px}
.cat-label{display:inline-flex;align-items:center;gap:6px;background:rgba(255,183,77,.15);color:#ffb74d;padding:4px 14px;border-radius:20px;font-size:.75em;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:24px}
.articles-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.art-card{display:block;text-decoration:none;border-radius:14px;background:#13131a;border:1px solid #1e1e2e;overflow:hidden;transition:all .25s}
.art-card:hover{transform:translateY(-3px);border-color:rgba(108,99,255,.35);box-shadow:0 8px 30px rgba(0,0,0,.4)}
.art-thumb{width:100%;height:160px;object-fit:cover;background:linear-gradient(135deg,#1e1e30,#2a2a40);display:block}
.art-body{padding:16px}
.art-meta{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.art-date{font-size:.72em;color:#8888a0}
.art-title{font-size:.92em;font-weight:700;color:#e8e8f0;line-height:1.4;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.art-excerpt{font-size:.78em;color:#8888a0;line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.art-footer{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-top:1px solid #1e1e2e}
.art-read{font-size:.75em;color:#6c63ff;font-weight:600}
.footer{max-width:1100px;margin:0 auto;padding:40px 24px;text-align:center;border-top:1px solid #1e1e2e;color:#8888a0;font-size:.8em}
.footer a{color:#8888a0;text-decoration:none}
.footer a:hover{color:#6c63ff}
.empty{text-align:center;padding:80px 0;color:#8888a0}
.empty-icon{font-size:3em;margin-bottom:12px}
@media(max-width:600px){.articles-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
<div class="container" style="padding-bottom:0">
<div class="breadcrumb"><a href="/">Home</a> &rsaquo; AI Verticals</div>
<h1><span>🏭</span>Manufacturing</h1>
<p class="subtitle">AI in Manufacturing</p>
<a href="/" class="back-link">← Back to AI Verticals Home</a>
</div>
</header>
<main class="container">
<div class="cat-label">🏭 Manufacturing</div>
<div class="articles-grid" id="articles"><p class="empty"><span class="empty-icon">📭</span><br>No articles yet in this category.<br>Check back soon.</p></div>
</main>
<footer class="footer">
<p>© 2025–2026 <a href="/">AI Verticals</a> · <a href="mailto:xiaokangjiao@gmail.com">xiaokangjiao@gmail.com</a></p>
</footer>
<script>
(async function(){
  try{
    const r = await fetch('/en/articles/manifest.json');
    if(!r.ok) return;
    const data = await r.json();
    const filtered = data.filter(a => a.category === 'manufacturing').reverse();
    const container = document.getElementById('articles');
    if(!filtered.length) return;
    container.innerHTML = filtered.map(a => `
      <a href="/en/articles/${a.file}" class="art-card">
        <img class="art-thumb" src="${a.cover || 'https://picsum.photos/seed/'+a.slug+'/600/320'}" alt="${a.title}" loading="lazy" onerror="this.style.display='none'">
        <div class="art-body">
          <div class="art-meta"><span class="art-date">${a.date||''}</span></div>
          <div class="art-title">${a.title}</div>
        </div>
        <div class="art-footer"><span class="art-read">Read →</span></div>
      </a>`).join('');
  }catch(e){}
})();
</script>
</body>
</html>
