<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c63ff"/>
      <stop offset="100%" style="stop-color:#00d4aa"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#a099ff"/>
    </linearGradient>
  </defs>
  <!-- dark background -->
  <rect width="512" height="512" rx="96" fill="#0a0a0f"/>
  
  <!-- 8 vertical lines radiating from center -->
  <g stroke="url(#grad)" stroke-width="10" stroke-linecap="round" opacity="0.9">
    <line x1="256" y1="256" x2="256" y2="86"/>
    <line x1="256" y1="256" x2="376" y2="136"/>
    <line x1="256" y1="256" x2="426" y2="256"/>
    <line x1="256" y1="256" x2="376" y2="376"/>
    <line x1="256" y1="256" x2="256" y2="426"/>
    <line x1="256" y1="256" x2="136" y2="376"/>
    <line x1="256" y1="256" x2="86" y2="256"/>
    <line x1="256" y1="256" x2="136" y2="136"/>
  </g>
  
  <!-- outer ring of 8 nodes (8 verticals) -->
  <g fill="#0a0a0f" stroke="url(#grad)" stroke-width="6">
    <circle cx="256" cy="86" r="16"/>
    <circle cx="376" cy="136" r="16"/>
    <circle cx="426" cy="256" r="16"/>
    <circle cx="376" cy="376" r="16"/>
    <circle cx="256" cy="426" r="16"/>
    <circle cx="136" cy="376" r="16"/>
    <circle cx="86" cy="256" r="16"/>
    <circle cx="136" cy="136" r="16"/>
  </g>
  
  <!-- inner nodes -->
  <g fill="url(#grad)">
    <circle cx="256" cy="86" r="7"/>
    <circle cx="376" cy="136" r="7"/>
    <circle cx="426" cy="256" r="7"/>
    <circle cx="376" cy="376" r="7"/>
    <circle cx="256" cy="426" r="7"/>
    <circle cx="136" cy="376" r="7"/>
    <circle cx="86" cy="256" r="7"/>
    <circle cx="136" cy="136" r="7"/>
  </g>
  
  <!-- central AI core: hexagon with circuit pattern -->
  <polygon points="256,166 316,201 316,271 256,306 196,271 196,201" fill="url(#coreGrad)" opacity="0.95"/>
  <circle cx="256" cy="236" r="26" fill="#0a0a0f"/>
  <circle cx="256" cy="236" r="14" fill="url(#grad)"/>
  
  <!-- subtle circuit traces inside hexagon -->
  <g stroke="#0a0a0f" stroke-width="4" stroke-linecap="round" opacity="0.6">
    <line x1="256" y1="201" x2="256" y2="210"/>
    <line x1="256" y1="262" x2="256" y2="271"/>
    <line x1="290" y1="236" x2="281" y2="236"/>
    <line x1="222" y1="236" x2="231" y2="236"/>
  </g>
</svg>
